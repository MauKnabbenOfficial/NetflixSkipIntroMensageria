server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy reverso → API (.NET) via rede interna Docker ────────────────
    # O browser acessa /api/* → nginx repassa para http://netflix-api:8080/*
    # sem expor a porta da API diretamente. Assim o frontend e backend
    # ficam na mesma origin do ponto de vista do browser (sem CORS).
    location /api/ {
        proxy_pass         http://netflix-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Vídeos servidos pela API via static files ─────────────────────────
    location /videos/ {
        proxy_pass         http://netflix-api:8080/videos/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback: todas as rotas Vue devolvem o index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
